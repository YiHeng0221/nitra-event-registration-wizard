name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Install & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0

      - name: Enable Corepack (yarn 4.6)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Prepare Quasar types (.quasar)
        run: yarn quasar prepare

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Build
        run: yarn build

name: claude-review

# Auto-review every pull request with Claude Code, using the project's
# code-review skill (.claude/skills/code-review/SKILL.md) as the rubric.
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write # required by claude-code-action for OIDC token exchange

concurrency:
  # One review per PR branch; a new push cancels an in-flight review.
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude code review
    # Skip drafts — review only when the PR is ready.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use the workflow's built-in token so the Claude GitHub App is not required.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Post the review as a single sticky PR comment (otherwise a clean
          # review posts nothing and the green check is meaningless).
          use_sticky_comment: true
          # Load the project's skill so review follows our three-lens rubric.
          claude_args: "--model sonnet --setting-sources project"
          prompt: |
            Review this pull request using the project's code-review skill at
            .claude/skills/code-review/SKILL.md. Do not modify code — review only.

            Apply the three lenses — (1) correctness & business logic,
            (2) Vue patterns & design fidelity, (3) architecture & quality —
            honouring CLAUDE.md and the ADRs in doc/. Watch the graded business
            rules: prices from src/mocks/event.js, VIP 10% discount on workshops
            only, shipping-required-when-merch, capacity/overlap availability,
            deferred submit-time validation (never gate navigation).

            ALWAYS post a single summary PR comment (even when the PR is clean),
            containing:
            - a one-line `VERDICT: pass | changes-requested`
            - the per-lens findings table with counts
            - each finding tagged 🔴 / 🟡 / 🟣 with `file:line` and a one-line reason (cap nits at 5)
            - if nothing to flag, say "No blocking issues found" and explain briefly what you checked

            Where useful, also leave inline comments on specific lines.
